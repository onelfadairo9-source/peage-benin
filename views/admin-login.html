<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion administrateur — Péage Bénin</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="page" style="background:var(--navy);">
  <div class="container-narrow" style="padding-top:80px; padding-bottom:60px;">
    <div style="text-align:center; margin-bottom:24px;">
      <span class="brand-badge" style="display:inline-flex; width:48px; height:48px; font-size:1.4rem;">⛊</span>
      <h1 style="color:white; margin:14px 0 4px;">Espace administrateur</h1>
      <p style="color:rgba(255,255,255,0.6);">Péage Bénin — Gestion de la plateforme</p>
    </div>

    <div class="form-card">
      <div class="alert" id="alertBox"></div>
      <form id="adminLoginForm">
        <div class="form-group">
          <label>Email administrateur</label>
          <input type="email" id="email" required placeholder="admin@peage-benin.bj">
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-navy btn-block" id="submitBtn">Se connecter</button>
      </form>
      <div class="form-footer"><a href="/">← Retour au site</a></div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const form = document.getElementById('adminLoginForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Connexion…';

      const payload = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/admin-dashboard.html';
        } else {
          showAlert(alertBox, data.message || 'Identifiants incorrects');
        }
      } catch (err) {
        showAlert(alertBox, 'Erreur réseau, veuillez réessayer.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
